# Figure 4: Hyperparameter sensitivity for DTR (threshold g, depth ratio rho)
# Grid sweep over g and rho on GPQA-Diamond
defaults:
  - /base
  - _self_

experiment:
  name: figure4_hyperparameter_sensitivity
  description: >-
    Sweep JSD threshold (g) and depth ratio (rho) to measure DTR
    sensitivity. Uses pre-computed JSD matrices from Table 1 generation
    data on GPQA-Diamond.

# Source data from Table 1 generation runs
source:
  reuse_from: table1
  benchmarks:
    - gpqa_diamond

models:
  - deepseek_r1_70b
  - qwen3_30b

sweep:
  threshold_g:
    - 0.25
    - 0.5
    - 0.75
  depth_ratio_rho:
    - 0.8
    - 0.85
    - 0.9
    - 0.95

output:
  figure: ${paths.figures_dir}/figure4_sensitivity.pdf
  raw: ${paths.raw_dir}/figure4
